name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --all-groups

      - name: ruff check
        run: uv run ruff check pysipnet/ tests/

      - name: ruff format check
        run: uv run ruff format --check pysipnet/ tests/

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups

      # Cache the compiled binaries keyed on the submodule commit so the
      # expensive compile step is skipped on reruns with no SIPNET changes.
      - name: Cache SIPNET binaries
        id: cache-sipnet
        uses: actions/cache@v4
        with:
          path: .sipnet_cache/
          key: sipnet-${{ runner.os }}-${{ hashFiles('.git/modules/sipnet/HEAD', 'sipnet/src/**/*.c', 'sipnet/src/**/*.h', 'patches/apply_flags_patch.py', 'Makefile') }}

      - name: Build SIPNET binaries
        if: steps.cache-sipnet.outputs.cache-hit != 'true'
        run: make sipnet-standard

      - name: Run tests
        run: uv run pytest tests/ --tb=short -q
