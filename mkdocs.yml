site_name: pySIPNET
site_description: Clean Python interface to the SIPNET land surface model
site_author: Andrew Roberts
repo_url: https://github.com/andrewroberts/pySIPNET
repo_name: andrewroberts/pySIPNET

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_submodules: false
            members_order: source

nav:
  - Home: index.md
  - Installation: installation.md
  - SIPNET Version: sipnet-version.md
  - Design: design.md
  - User Guide:
      - Running a Model: user-guide/running-a-model.md
      - Ensemble Runs: user-guide/ensemble-runs.md
      - Reproducible Workflows: user-guide/reproducible-runs.md
      - File I/O and Working Directories: user-guide/file-io.md
  - API Reference:
      - Overview: api/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
